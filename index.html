<script>
const STORAGE_KEY='repdaddy_safe_v4';

const defaultTemplates=[
  {id:'push',name:'Push Day',exercises:['Bench Press','Incline DB Press','Shoulder Press','Lateral Raise','Tricep Pushdown']},
  {id:'pull',name:'Pull Day',exercises:['Barbell Row','Lat Pulldown','Seated Row','Rear Delt Fly','Barbell Curl']},
  {id:'legs',name:'Legs',exercises:['Back Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raise']},
  {id:'upper',name:'Upper',exercises:['Bench Press','Barbell Row','Incline DB Press','Lat Pulldown','Lateral Raise','Cable Curl']},
  {id:'lower',name:'Lower',exercises:['Back Squat','Romanian Deadlift','Walking Lunge','Leg Extension','Seated Calf Raise']},
  {id:'fullA',name:'Full Body A',exercises:['Back Squat','Bench Press','Barbell Row','Romanian Deadlift','Cable Crunch']},
  {id:'fullB',name:'Full Body B',exercises:['Deadlift','Incline DB Press','Lat Pulldown','Leg Press','Lateral Raise']},
  {id:'core',name:'Core',exercises:['Cable Crunch','Hanging Knee Raise','Ab Wheel','Plank']},
  {id:'chesttri',name:'Chest + Triceps',exercises:['Bench Press','Incline DB Press','Machine Chest Press','Cable Fly','Tricep Pushdown','Overhead Extension']},
  {id:'backbi',name:'Back + Biceps',exercises:['Barbell Row','Lat Pulldown','Seated Row','Chest Supported Row','Barbell Curl','Hammer Curl']},
  {id:'shouldersarms',name:'Shoulders + Arms',exercises:['Shoulder Press','Lateral Raise','Rear Delt Fly','EZ Bar Curl','Tricep Pushdown','Hammer Curl']},
  {id:'pbupper',name:'Powerbuilding Upper',exercises:['Bench Press','Barbell Row','Incline DB Press','Weighted Pull-Up','Lateral Raise','Cable Curl']},
  {id:'pblower',name:'Powerbuilding Lower',exercises:['Back Squat','Romanian Deadlift','Leg Press','Walking Lunge','Leg Curl','Calf Raise']},
  {id:'hyppush',name:'Hypertrophy Push',exercises:['Machine Chest Press','Incline DB Press','Seated Shoulder Press','Lateral Raise','Cable Fly','Rope Pushdown']},
  {id:'hyppull',name:'Hypertrophy Pull',exercises:['Lat Pulldown','Seated Row','Chest Supported Row','Rear Delt Fly','Cable Curl','Incline DB Curl']},
  {id:'glutesham',name:'Glutes + Hamstrings',exercises:['Romanian Deadlift','Hip Thrust','Leg Curl','Walking Lunge','Glute Bridge']},
  {id:'quads',name:'Quads Focus',exercises:['Back Squat','Hack Squat','Leg Press','Leg Extension','Bulgarian Split Squat']},
  {id:'deload',name:'Deload Full Body',exercises:['Goblet Squat','Push-Up','Lat Pulldown','DB Romanian Deadlift','Plank']}
];

const defaultState={
  settings:{rest:60,show1rm:true,autoTimer:false},
  templates:defaultTemplates,
  activeWorkouts:[],
  finishedWorkouts:[],
  bodyweight:[],
  prs:{},
  timer:{running:false,end:0,workoutId:null,exerciseId:null},
  ui:{tab:'homeScreen'}
};

let state=loadState();
let timerInt=null;

function uid(){
  return Math.random().toString(36).slice(2)+Date.now().toString(36);
}

function clone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return clone(defaultState);
    const p=JSON.parse(raw);
    return {
      ...clone(defaultState),
      ...p,
      settings:{...defaultState.settings,...(p.settings||{})},
      templates:Array.isArray(p.templates)&&p.templates.length?p.templates:defaultTemplates,
      activeWorkouts:Array.isArray(p.activeWorkouts)?p.activeWorkouts:[],
      finishedWorkouts:Array.isArray(p.finishedWorkouts)?p.finishedWorkouts:[],
      bodyweight:Array.isArray(p.bodyweight)?p.bodyweight:[],
      prs:p.prs||{},
      timer:{...defaultState.timer,...(p.timer||{})},
      ui:{...defaultState.ui,...(p.ui||{})}
    };
  }catch(e){
    return clone(defaultState);
  }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  const t=new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
  document.getElementById('saveStatus').textContent='Saved '+t;
}

function toast(msg){
  const w=document.getElementById('toastWrap');
  const d=document.createElement('div');
  d.className='toast';
  d.textContent=msg;
  w.appendChild(d);
  setTimeout(()=>d.remove(),1800);
}

function nowClock(){
  const d=new Date();
  document.getElementById('clockPill').textContent=d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}
setInterval(nowClock,1000);
nowClock();

function switchTab(id){
  state.ui.tab=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  saveState();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

function mkSet(n){
  return {id:uid(),label:'Set '+n,weight:'',reps:'',done:false};
}

function mkExercise(name){
  return {id:uid(),name,open:false,notes:'',sets:[mkSet(1),mkSet(2),mkSet(3)]};
}

function mkWorkout(name,arr=[]){
  return {
    id:uid(),
    name,
    createdAt:Date.now(),
    completedAt:null,
    exercises:(arr.length?arr:['Exercise 1']).map(mkExercise)
  };
}

function est1rm(w,r){
  w=Number(w);
  r=Number(r);
  if(!w||!r) return 0;
  return Math.round(w*(1+r/30));
}

function calcVolumeWorkout(w){
  return w.exercises.reduce((a,e)=>a+e.sets.reduce((s,x)=>s+((Number(x.weight)||0)*(Number(x.reps)||0)),0),0);
}

function calcVolumeExercise(e){
  return e.sets.reduce((s,x)=>s+((Number(x.weight)||0)*(Number(x.reps)||0)),0);
}

function rebuildPRs(){
  const prs={};
  [...state.finishedWorkouts].forEach(w=>{
    w.exercises.forEach(ex=>{
      ex.sets.forEach(set=>{
        const weight=Number(set.weight)||0;
        const reps=Number(set.reps)||0;
        if(!weight||!reps) return;
        const key=ex.name.trim();
        const score=est1rm(weight,reps);
        if(!prs[key]||score>prs[key].e1rm){
          prs[key]={exercise:key,weight,reps,e1rm:score,date:w.completedAt||w.createdAt};
        }
      });
    });
  });
  state.prs=prs;
}

function lastPerf(name){
  for(const w of state.finishedWorkouts){
    for(const ex of w.exercises){
      if(ex.name.toLowerCase()===name.toLowerCase()){
        const set=ex.sets.find(s=>s.weight||s.reps);
        if(set) return `${set.weight||0}kg × ${set.reps||0}`;
      }
    }
  }
  return 'No previous data';
}

function getLastExerciseData(name){
  for(const w of state.finishedWorkouts){
    for(const ex of w.exercises){
      if(ex.name.toLowerCase()===name.toLowerCase()){
        return clone(ex);
      }
    }
  }
  return null;
}

function copyLast(ex){
  const prev=getLastExerciseData(ex.name);
  if(!prev){
    toast('No previous data');
    return;
  }
  while(ex.sets.length<prev.sets.length){
    ex.sets.push(mkSet(ex.sets.length+1));
  }
  ex.sets.forEach((s,i)=>{
    if(prev.sets[i]){
      s.weight=prev.sets[i].weight;
      s.reps=prev.sets[i].reps;
    }
  });
  saveState();
  renderWorkouts();
  toast('Copied last values');
}

function adjustWeight(ex,delta){
  const prev=getLastExerciseData(ex.name);
  ex.sets.forEach((s,i)=>{
    let base=s.weight!==''?Number(s.weight):(prev&&prev.sets[i]?Number(prev.sets[i].weight||0):NaN);
    if(Number.isNaN(base)) return;
    base=Math.max(0,base+delta);
    s.weight=String(Number.isInteger(base)?base:base.toFixed(1).replace(/\.0$/,''));
  });
  saveState();
  renderWorkouts();
}

function fmtDate(ts){
  return new Date(ts).toLocaleString();
}

function esc(v){
  return String(v??'')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function startTimer(sec,workoutId=null,exerciseId=null){
  state.timer={
    running:true,
    end:Date.now()+sec*1000,
    workoutId,
    exerciseId
  };
  saveState();
  runTimer();
  toast('Timer started');
}

function stopTimer(){
  state.timer={running:false,end:0,workoutId:null,exerciseId:null};
  saveState();
  updateTimer();
}

function updateTimer(){
  const pill=document.getElementById('timerPill');
  if(!state.timer.running){
    pill.classList.remove('show');
    return;
  }
  const left=Math.max(0,Math.ceil((state.timer.end-Date.now())/1000));
  document.getElementById('timerText').textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
  pill.classList.add('show');

  if(left<=0){
    stopTimer();
    if(navigator.vibrate) navigator.vibrate([160,80,180]);
    toast('Rest done');
  }
}

function runTimer(){
  if(timerInt) clearInterval(timerInt);
  updateTimer();
  timerInt=setInterval(updateTimer,250);
}

function renderHome(){
  document.getElementById('dashWeight').textContent=state.bodyweight[0]?state.bodyweight[0].value+' kg':'—';
  document.getElementById('dashSessions').textContent=state.finishedWorkouts.length;

  const weekAgo=Date.now()-7*24*3600e3;
  const vol=state.finishedWorkouts
    .filter(w=>(w.completedAt||0)>=weekAgo)
    .reduce((a,w)=>a+calcVolumeWorkout(w),0);

  document.getElementById('dashVolume').textContent=vol+' kg';
  document.getElementById('dashPrs').textContent=Object.keys(state.prs).length;

  const hr=document.getElementById('homeRecent');
  if(!state.finishedWorkouts.length){
    hr.className='empty';
    hr.textContent='No completed workouts yet.';
  }else{
    hr.className='';
    hr.innerHTML=state.finishedWorkouts.slice(0,3).map(w=>`
      <div class="list-item">
        <div class="w-name">${esc(w.name)}</div>
        <div class="muted tiny">${fmtDate(w.completedAt)} · ${calcVolumeWorkout(w)} kg</div>
      </div>
    `).join('');
  }
}

function renderTemplateSelect(){
  const sel=document.getElementById('templateSelect');
  sel.innerHTML=state.templates.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
}

function renderWorkouts(){
  const wrap=document.getElementById('activeWorkouts');

  if(!state.activeWorkouts.length){
    wrap.innerHTML='<div class="card section empty">No active workouts. Create one or load a template.</div>';
    return;
  }

  wrap.innerHTML='';

  state.activeWorkouts.forEach((w,wi)=>{
    const card=document.createElement('div');
    card.className='card workout-card';
    card.innerHTML=`
      <div class="w-head">
        <div>
          <div class="w-name">${esc(w.name)}</div>
          <div class="muted tiny">${w.exercises.length} exercises · ${calcVolumeWorkout(w)} kg</div>
        </div>
        <div class="row">
          <button class="btn btn-soft small add-ex">+ Exercise</button>
          <button class="btn btn-soft small rest-w">Rest</button>
          <button class="btn btn-danger small stop-w">Stop</button>
          <button class="btn btn-primary small finish-w">Finish</button>
        </div>
      </div>
      <div class="exercise-wrap"></div>
    `;

    const exWrap=card.querySelector('.exercise-wrap');

    w.exercises.forEach((ex,ei)=>{
      const doneCount=ex.sets.filter(s=>s.done).length;
      const exEl=document.createElement('div');
      exEl.className='exercise'+(ex.open?' open':'');
      exEl.innerHTML=`
        <div class="exercise-header">
          <div>
            <div class="exercise-title">${esc(ex.name)}</div>
            <div class="muted tiny">Previous: ${esc(lastPerf(ex.name))} · ${doneCount}/${ex.sets.length} sets</div>
          </div>
          <div class="row">
            <button class="btn btn-soft small ex-rest">Timer</button>
            <span class="badge">${calcVolumeExercise(ex)} kg</span>
            <span class="chev">⌄</span>
          </div>
        </div>
        <div class="exercise-body">
          <div class="quick">
            <button class="btn btn-soft small same-last">Last</button>
            <button class="btn btn-soft small plus25">+2.5</button>
            <button class="btn btn-soft small minus25">-2.5</button>
            <button class="btn btn-soft small add-set">+ Set</button>
          </div>
          <div class="sets"></div>
          <div class="row" style="margin-top:8px">
            <textarea class="notes" placeholder="Notes">${esc(ex.notes)}</textarea>
          </div>
        </div>
      `;

      exEl.querySelector('.exercise-header').onclick=(ev)=>{
        if(ev.target.closest('.ex-rest')) return;
        w.exercises.forEach((x,idx)=>x.open=idx===ei?!x.open:false);
        saveState();
        renderWorkouts();
      };

      exEl.querySelector('.ex-rest').onclick=(ev)=>{
        ev.stopPropagation();
        startTimer(state.settings.rest,w.id,ex.id);
      };

      exEl.querySelector('.same-last').onclick=(ev)=>{
        ev.stopPropagation();
        copyLast(ex);
      };

      exEl.querySelector('.plus25').onclick=(ev)=>{
        ev.stopPropagation();
        adjustWeight(ex,2.5);
      };

      exEl.querySelector('.minus25').onclick=(ev)=>{
        ev.stopPropagation();
        adjustWeight(ex,-2.5);
      };

      exEl.querySelector('.add-set').onclick=(ev)=>{
        ev.stopPropagation();
        ex.sets.push(mkSet(ex.sets.length+1));
        saveState();
        renderWorkouts();
      };

      exEl.querySelector('.notes').oninput=(e)=>{
        ex.notes=e.target.value;
        saveState();
      };

      const setsEl=exEl.querySelector('.sets');

      ex.sets.forEach((set,si)=>{
        const row=document.createElement('div');
        row.className='setrow';
        row.innerHTML=`
          <div class="setlabel">${set.label}</div>
          <input type="number" step="0.5" placeholder="Weight" value="${set.weight}">
          <input type="number" step="1" placeholder="Reps" value="${set.reps}">
          <input class="setdone" type="checkbox" ${set.done?'checked':''}>
          <button class="iconbtn">×</button>
        `;

        const weightIn=row.children[1];
        const repsIn=row.children[2];
        const check=row.children[3];
        const del=row.children[4];

        weightIn.oninput=e=>{
          set.weight=e.target.value;
          saveState();
          renderProgress();
        };

        repsIn.oninput=e=>{
          set.reps=e.target.value;
          saveState();
          renderProgress();
        };

        check.onchange=e=>{
          set.done=e.target.checked;
          saveState();
          if(set.done && state.settings.autoTimer){
            startTimer(state.settings.rest,w.id,ex.id);
          }
          renderWorkouts();
        };

        del.onclick=()=>{
          ex.sets.splice(si,1);
          ex.sets.forEach((s,i)=>s.label='Set '+(i+1));
          saveState();
          renderWorkouts();
        };

        setsEl.appendChild(row);
      });

      exWrap.appendChild(exEl);
    });

    card.querySelector('.add-ex').onclick=()=>{
      const n=prompt('Exercise name');
      if(!n||!n.trim()) return;
      w.exercises.push(mkExercise(n.trim()));
      saveState();
      renderWorkouts();
      toast('Exercise added');
    };

    card.querySelector('.rest-w').onclick=()=>{
      startTimer(state.settings.rest,w.id,null);
    };

    card.querySelector('.stop-w').onclick=()=>{
      if(!confirm('Discard this workout?')) return;
      state.activeWorkouts.splice(wi,1);
      if(state.timer.workoutId===w.id) stopTimer();
      saveState();
      renderAll();
      toast('Workout discarded');
    };

    card.querySelector('.finish-w').onclick=()=>{
      if(!confirm('Finish this workout?')) return;
      finishWorkout(w.id);
    };

    wrap.appendChild(card);
  });
}

function finishWorkout(id){
  const i=state.activeWorkouts.findIndex(w=>w.id===id);
  if(i<0) return;

  const w=state.activeWorkouts[i];
  w.completedAt=Date.now();

  state.finishedWorkouts.unshift(clone(w));
  state.activeWorkouts.splice(i,1);

  if(state.timer.workoutId===w.id) stopTimer();

  saveState();
  renderAll();
  toast('Workout finished');
}

function deleteHistory(index){
  if(!confirm('Delete this finished workout?')) return;
  state.finishedWorkouts.splice(index,1);
  saveState();
  renderAll();
  toast('Workout deleted');
}

function renderHistory(){
  const wrap=document.getElementById('historyList');

  if(!state.finishedWorkouts.length){
    wrap.className='empty';
    wrap.textContent='No finished workouts yet.';
    return;
  }

  wrap.className='';
  wrap.innerHTML=state.finishedWorkouts.map((w,i)=>`
    <div class="history-item">
      <div class="w-name">${esc(w.name)}</div>
      <div class="muted tiny">${fmtDate(w.completedAt)} · ${calcVolumeWorkout(w)} kg · ${w.exercises.length} exercises</div>
      <div class="row" style="margin-top:10px">
        <button class="btn btn-danger small hist-del" data-index="${i}">Delete</button>
      </div>
    </div>
  `).join('');

  wrap.querySelectorAll('.hist-del').forEach(btn=>{
    btn.onclick=()=>deleteHistory(Number(btn.dataset.index));
  });
}

function drawBodyweight(){
  const svg=document.getElementById('bwChart');
  const data=[...state.bodyweight].sort((a,b)=>a.createdAt-b.createdAt);

  if(data.length<2){
    svg.innerHTML='<text x="12" y="90" fill="#95a3b8" font-size="12">Add at least 2 entries</text>';
    return;
  }

  const W=300,H=180,P=16;
  const vals=data.map(d=>Number(d.value));
  const min=Math.min(...vals),max=Math.max(...vals),range=Math.max(.5,max-min);

  const pts=data.map((d,i)=>{
    const x=P+i*((W-P*2)/(data.length-1));
    const y=H-P-((Number(d.value)-min)/range)*(H-P*2);
    return{x,y,v:d.value};
  });

  const path=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  svg.innerHTML=`
    <path d="${path}" fill="none" stroke="#5aa7ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#79b7ff"></circle>`).join('')}
  `;
}

function drawVolume(){
  const svg=document.getElementById('volChart');
  const days=[...Array(7)].map((_,i)=>{
    const start=new Date();
    start.setHours(0,0,0,0);
    start.setDate(start.getDate()-(6-i));
    const end=new Date(start);
    end.setDate(end.getDate()+1);

    const total=state.finishedWorkouts
      .filter(w=>(w.completedAt||0)>=start.getTime()&&(w.completedAt||0)<end.getTime())
      .reduce((a,w)=>a+calcVolumeWorkout(w),0);

    return total;
  });

  const W=300,H=180,P=18;
  const max=Math.max(1,...days);
  const barW=(W-P*2)/7-8;

  svg.innerHTML=days.map((v,i)=>{
    const x=P+i*((W-P*2)/7)+4;
    const h=(v/max)*(H-P*2);
    const y=H-P-h;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="8" fill="#5aa7ff"></rect>`;
  }).join('');
}

function renderProgress(){
  rebuildPRs();
  const prList=document.getElementById('prList');
  const prs=Object.values(state.prs).sort((a,b)=>b.e1rm-a.e1rm);

  prList.className=prs.length?'':'empty';
  prList.innerHTML=prs.length
    ? prs.map(p=>`
      <div class="list-item">
        <div class="w-name">${esc(p.exercise)}</div>
        <div class="muted tiny">${p.weight}kg × ${p.reps}${state.settings.show1rm?` · Est 1RM ${p.e1rm}kg`:''}</div>
      </div>
    `).join('')
    : 'No PRs yet.';

  drawBodyweight();
  drawVolume();
}

function renderSettings(){
  document.getElementById('restSelect').value=String(state.settings.rest);
  document.getElementById('show1rmToggle').checked=state.settings.show1rm;
  document.getElementById('autoTimerToggle').checked=state.settings.autoTimer;
}

function renderAll(){
  renderHome();
  renderTemplateSelect();
  renderWorkouts();
  renderHistory();
  renderProgress();
  renderSettings();
  switchTab(state.ui.tab||'homeScreen');
}

document.getElementById('timerStopBtn').onclick=stopTimer;

document.getElementById('addWorkoutBtn').onclick=()=>{
  const n=document.getElementById('workoutNameInput').value.trim();
  if(!n) return;
  state.activeWorkouts.unshift(mkWorkout(n));
  document.getElementById('workoutNameInput').value='';
  saveState();
  renderWorkouts();
  toast('Workout created');
};

document.getElementById('loadTemplateBtn').onclick=()=>{
  const id=document.getElementById('templateSelect').value;
  const t=state.templates.find(x=>x.id===id);
  if(!t) return;
  state.activeWorkouts.unshift(mkWorkout(t.name,t.exercises));
  saveState();
  renderWorkouts();
  switchTab('workoutsScreen');
  toast('Template loaded');
};

document.getElementById('saveBodyweightBtn').onclick=()=>{
  const input=document.getElementById('bodyweightInput');
  const v=Number(input.value);
  if(!v){
    toast('Enter valid bodyweight');
    return;
  }
  state.bodyweight.unshift({id:uid(),value:v,createdAt:Date.now()});
  input.value='';
  saveState();
  renderHome();
  renderProgress();
  toast('Bodyweight saved');
};

document.getElementById('quickNewWorkout').onclick=()=>{
  document.getElementById('workoutModal').classList.add('show');
  document.getElementById('modalWorkoutName').focus();
};

document.getElementById('quickBodyweight').onclick=()=>switchTab('progressScreen');

document.getElementById('modalCreateWorkoutBtn').onclick=()=>{
  const n=document.getElementById('modalWorkoutName').value.trim();
  if(!n) return;
  state.activeWorkouts.unshift(mkWorkout(n));
  document.getElementById('modalWorkoutName').value='';
  document.getElementById('workoutModal').classList.remove('show');
  saveState();
  renderWorkouts();
  switchTab('workoutsScreen');
  toast('Workout created');
};

document.getElementById('closeModalBtn').onclick=()=>document.getElementById('workoutModal').classList.remove('show');

document.getElementById('restSelect').onchange=e=>{
  state.settings.rest=Number(e.target.value);
  saveState();
};

document.getElementById('show1rmToggle').onchange=e=>{
  state.settings.show1rm=e.target.checked;
  saveState();
  renderProgress();
};

document.getElementById('autoTimerToggle').onchange=e=>{
  state.settings.autoTimer=e.target.checked;
  saveState();
};

document.getElementById('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({app:'Rep Daddy Safe V4',data:state},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='rep-daddy-safe-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

document.getElementById('restoreInput').onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      state={...clone(defaultState),...(parsed.data||parsed)};
      saveState();
      renderAll();
      toast('Backup restored');
    }catch(err){
      alert('Restore failed');
    }
  };
  r.readAsText(f);
  e.target.value='';
};

document.getElementById('clearBtn').onclick=()=>{
  if(!confirm('Clear all app data?')) return;
  state=clone(defaultState);
  saveState();
  renderAll();
  stopTimer();
  toast('Data cleared');
};

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden') saveState();
});

window.addEventListener('beforeunload',saveState);

renderAll();
if(state.timer.running) runTimer();
saveState();
</script>
