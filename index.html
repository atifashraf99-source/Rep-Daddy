<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rep Daddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rep Daddy">
  <meta name="theme-color" content="#0b0d12">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    :root{
      --bg:#0b0d12;--bg-2:#11151d;--card:#151a23;--card-2:#1b2230;--text:#f5f7fb;--muted:#98a2b3;
      --line:#273040;--accent:#3b82f6;--accent-2:#60a5fa;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;
      --shadow:0 18px 40px rgba(0,0,0,.28);--nav-h:78px;--top-safe: env(safe-area-inset-top);--bottom-safe: env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;padding:0;background:linear-gradient(180deg,#0b0d12 0%,#0f141d 100%);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    body{min-height:100vh} button,input,select,textarea{font:inherit} input,select,textarea{width:100%;background:#0f141c;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:13px 14px;font-size:16px;outline:none} textarea{min-height:80px;resize:vertical}
    .app{max-width:920px;margin:0 auto;padding:calc(16px + var(--top-safe)) 16px calc(var(--nav-h) + 20px + var(--bottom-safe))}
    .topbar{position:sticky;top:0;z-index:15;margin:-16px -16px 16px;padding:calc(14px + var(--top-safe)) 16px 14px;backdrop-filter:blur(20px);background:rgba(11,13,18,.78);border-bottom:1px solid rgba(255,255,255,.05)}
    .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}
    .brand-logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#1d4ed8);display:grid;place-items:center;box-shadow:0 10px 24px rgba(59,130,246,.35);font-weight:900}
    .brand h1{margin:0;font-size:1.35rem;letter-spacing:-.04em}.brand p{margin:3px 0 0;color:var(--muted);font-size:.82rem}.save-chip{min-width:100px;text-align:right;color:var(--muted);font-size:.78rem;font-weight:700}
    .screen{display:none}.screen.active{display:block}
    .hero-card,.card,.stat-card,.workout-card,.exercise-card,.history-card,.sheet,.template-card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:24px;box-shadow:var(--shadow)}
    .hero-card{padding:20px;margin-bottom:14px;overflow:hidden;position:relative}.hero-card::after{content:"";position:absolute;inset:auto -20% -35% auto;width:260px;height:260px;border-radius:999px;background:radial-gradient(circle, rgba(59,130,246,.28), transparent 70%);pointer-events:none}
    .hero-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.hero-title h2{margin:0;font-size:1.55rem;letter-spacing:-.05em}.hero-sub{color:var(--muted);margin-top:6px;font-size:.92rem}
    .pill{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.14);border:1px solid rgba(96,165,250,.18);padding:8px 11px;border-radius:999px;color:#dbeafe;font-weight:800;font-size:.76rem}
    .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.stat-card{padding:14px}.label{color:var(--muted);font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}.value{margin-top:8px;font-size:1.25rem;font-weight:900;letter-spacing:-.03em}.subvalue{margin-top:6px;color:var(--muted);font-size:.8rem}
    .card{padding:16px;margin-bottom:14px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.section-head h3{margin:0;font-size:1.02rem;letter-spacing:-.03em}
    .btn{border:none;border-radius:14px;padding:12px 14px;background:#1b2230;color:var(--text);font-weight:800;cursor:pointer;transition:.18s transform,.18s opacity,.18s background}.btn:active{transform:scale(.98)} .btn.primary{background:linear-gradient(135deg,var(--accent),#2563eb);color:white;box-shadow:0 10px 22px rgba(59,130,246,.32)} .btn.ghost{background:#111826;border:1px solid var(--line)} .btn.success{background:linear-gradient(135deg,#16a34a,#22c55e);color:white} .btn.danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:white} .btn.small{padding:9px 11px;border-radius:12px;font-size:.84rem} .btn.icon{width:42px;height:42px;padding:0;display:grid;place-items:center}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}.quick-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .quick-btn{padding:14px;border-radius:18px;background:#121a26;border:1px solid var(--line);display:flex;align-items:center;gap:10px;font-weight:800}.quick-btn .bubble{width:40px;height:40px;border-radius:14px;background:#1c2940;display:grid;place-items:center}
    .empty{padding:18px;border-radius:18px;border:1px dashed var(--line);color:var(--muted);text-align:center}
    .workout-card{padding:14px;margin-bottom:12px}.workout-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.workout-title{font-size:1.05rem;font-weight:900;letter-spacing:-.03em}.workout-meta{color:var(--muted);font-size:.82rem;margin-top:4px}
    .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.chip{padding:8px 10px;background:#101723;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:.76rem;font-weight:800}
    .exercise-card{padding:12px;margin-top:10px;background:linear-gradient(180deg,#131924,#101620)}.exercise-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.exercise-title{font-size:.98rem;font-weight:900}.exercise-sub{margin-top:4px;color:var(--muted);font-size:.78rem;line-height:1.35}
    .mini-actions{display:flex;gap:6px;flex-wrap:wrap}.mini-btn{border:none;background:#101723;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:9px 10px;font-size:.8rem;font-weight:800}
    .set-list{display:grid;gap:8px;margin-top:10px}.set-row{display:grid;grid-template-columns:50px 1fr 1fr 42px 42px;gap:8px;align-items:center;background:#0f141c;border:1px solid var(--line);border-radius:16px;padding:8px}
    .set-row.done{border-color:rgba(34,197,94,.5);box-shadow:inset 0 0 0 1px rgba(34,197,94,.12);background:linear-gradient(180deg,rgba(34,197,94,.08),rgba(15,20,28,.95))}
    .set-index{display:grid;place-items:center;background:#182030;border-radius:12px;height:44px;font-weight:900}.set-check{width:24px;height:24px;margin:auto;appearance:none;border:2px solid #5b6578;border-radius:8px;background:transparent;cursor:pointer}.set-check:checked{background:linear-gradient(135deg,var(--green),#16a34a);border-color:transparent}
    .muted{color:var(--muted)}.history-card{padding:14px;margin-bottom:10px}.chart-wrap{background:#0f141c;border:1px solid var(--line);border-radius:18px;padding:12px}.chart{width:100%;height:180px;display:block}.chart path.line{fill:none;stroke:var(--accent-2);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.chart .point{fill:var(--accent-2)}.chart text{fill:var(--muted);font-size:10px;font-weight:700}
    .settings-list{display:grid;gap:12px}.setting-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;background:#101723;border:1px solid var(--line);border-radius:18px}
    .toggle{position:relative;width:52px;height:30px;flex:0 0 auto}.toggle input{display:none}.toggle span{position:absolute;inset:0;background:#232c3c;border-radius:999px;transition:.18s}.toggle span::after{content:"";position:absolute;width:22px;height:22px;left:4px;top:4px;border-radius:999px;background:white;transition:.18s}.toggle input:checked + span{background:var(--accent)}.toggle input:checked + span::after{transform:translateX(22px)}
    .nav{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:10px 14px calc(10px + var(--bottom-safe));background:linear-gradient(180deg,rgba(11,13,18,0),rgba(11,13,18,.92) 22%,rgba(11,13,18,.96));backdrop-filter:blur(18px)}
    .nav-inner{max-width:920px;margin:0 auto;background:rgba(17,21,29,.88);border:1px solid rgba(255,255,255,.06);border-radius:24px;display:grid;grid-template-columns:repeat(5,1fr);padding:8px;box-shadow:var(--shadow)}
    .nav-btn{border:none;background:transparent;color:var(--muted);padding:10px 4px;border-radius:18px;font-size:.75rem;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:6px}.nav-btn.active{background:#111826;color:var(--text)}
    .fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + 18px + var(--bottom-safe));z-index:18;width:58px;height:58px;border-radius:999px;border:none;background:linear-gradient(135deg,var(--accent),#2563eb);color:white;font-size:1.6rem;font-weight:900;box-shadow:0 16px 34px rgba(59,130,246,.35)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:none;z-index:50;padding:16px}.overlay.show{display:grid;place-items:end center}.sheet{width:min(100%,760px);padding:16px;max-height:88vh;overflow:auto}.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.sheet-title{font-size:1.1rem;font-weight:900;letter-spacing:-.03em}.field-grid{display:grid;gap:10px}
    .timer-overlay{position:fixed;right:16px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:16;display:none}.timer-overlay.show{display:block}.timer-card{width:84px;height:84px;border-radius:999px;background:rgba(12,16,24,.96);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 36px rgba(0,0,0,.36);display:grid;place-items:center;position:relative}
    .timer-svg{position:absolute;inset:6px}.timer-svg circle{fill:none;stroke-width:7}.timer-bg{stroke:#243046}.timer-bar{stroke:var(--accent-2);stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%}.timer-center{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.timer-time{font-size:1rem;font-weight:900;line-height:1}.timer-stop-mini{width:34px;height:34px;border-radius:999px;padding:0;display:grid;place-items:center;font-size:.78rem}
    .toast-wrap{position:fixed;left:14px;right:14px;top:calc(82px + var(--top-safe));z-index:60;display:grid;justify-items:center;pointer-events:none}.toast{background:#0e1520;border:1px solid var(--line);color:var(--text);padding:10px 14px;border-radius:999px;font-size:.82rem;font-weight:800;box-shadow:var(--shadow);opacity:0;transform:translateY(-10px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.18);color:#dcfce7;font-size:.74rem;font-weight:800}.list-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.05)}.list-row:first-child{border-top:none}.version{color:var(--muted);font-size:.78rem}.note{font-size:.78rem;color:var(--muted);line-height:1.45}
    @media (max-width:720px){.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}.set-row{grid-template-columns:72px 1fr 1fr 40px 40px}.workout-head,.exercise-head,.section-head,.hero-title{flex-wrap:wrap}.app{padding-left:12px;padding-right:12px}.topbar{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}.timer-overlay{right:14px;bottom:calc(88px + env(safe-area-inset-bottom))}.timer-card{width:78px;height:78px}}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbar-row"><div class="brand"><div class="brand-logo">RD</div><div><h1>Rep Daddy</h1><p>Premium training tracker</p></div></div><div id="saveStatus" class="save-chip">Ready</div></div></div>
  <div class="app">
    <section id="screen-home" class="screen active"></section>
    <section id="screen-workouts" class="screen"></section>
    <section id="screen-history" class="screen"></section>
    <section id="screen-progress" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
  </div>
  <button id="fabAdd" class="fab" title="Quick add">＋</button>
  <div id="timerOverlay" class="timer-overlay"><div class="timer-card"><svg class="timer-svg" viewBox="0 0 120 120"><circle class="timer-bg" cx="60" cy="60" r="48"></circle><circle id="timerBar" class="timer-bar" cx="60" cy="60" r="48"></circle></svg><div class="timer-center"><div id="timerTime" class="timer-time">0:00</div><button id="timerStopBtn" class="btn danger timer-stop-mini">■</button></div></div></div>
  <div class="nav"><div class="nav-inner"><button class="nav-btn active" data-nav="home"><span>🏠</span><span>Home</span></button><button class="nav-btn" data-nav="workouts"><span>🏋️</span><span>Workouts</span></button><button class="nav-btn" data-nav="history"><span>🕘</span><span>History</span></button><button class="nav-btn" data-nav="progress"><span>📈</span><span>Progress</span></button><button class="nav-btn" data-nav="settings"><span>⚙️</span><span>Settings</span></button></div></div>
  <div id="sheetOverlay" class="overlay"><div class="sheet"><div class="sheet-head"><div id="sheetTitle" class="sheet-title">Quick Add</div><button id="sheetCloseBtn" class="btn small ghost">Close</button></div><div id="sheetBody"></div></div></div>
  <div class="toast-wrap"><div id="toast" class="toast"></div></div>
<script>
(()=>{const STORAGE_KEY="repDaddy_v4_premium",DB_NAME="repDaddyDBv4",DB_STORE="appState",DB_RECORD_ID="mainState";
const starterTemplates=[{id:"push",name:"Push Day",exercises:["Bench Press","Incline DB Press","Shoulder Press","Lateral Raise","Tricep Pushdown"]},{id:"pull",name:"Pull Day",exercises:["Lat Pulldown","Barbell Row","Seated Row","Rear Delt Fly","Barbell Curl"]},{id:"legs",name:"Legs",exercises:["Back Squat","Romanian Deadlift","Leg Press","Leg Curl","Calf Raise"]},{id:"upper",name:"Upper",exercises:["Bench Press","Barbell Row","Incline DB Press","Lat Pulldown","Cable Curl"]},{id:"core",name:"Core",exercises:["Cable Crunch","Hanging Knee Raise","Ab Wheel","Plank (sec)","Decline Sit-Up"]}];
const defaultState={version:"4.1",activeTab:"home",theme:"dark",settings:{defaultTimer:60,autoStartTimer:false,showVolume:true,show1RM:true,units:"kg"},bodyweight:[],templates:starterTemplates,activeWorkouts:[],finishedWorkouts:[],prs:{},streak:0,timer:{running:false,startedAt:null,endTime:null,duration:0,sourceWorkoutId:null,sourceExerciseId:null}};
let dbPromise=null,state=JSON.parse(JSON.stringify(defaultState)),toastTimer=null,saveTimer=null,interval=null;
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)} function clone(v){return JSON.parse(JSON.stringify(v))}
function showToast(msg){const el=$("#toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),1800)}
function setSaveStatus(t){$("#saveStatus").textContent=t} function markSaved(){const t=new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});setSaveStatus("Saved "+t);clearTimeout(saveTimer);saveTimer=setTimeout(()=>setSaveStatus("Saved "+t),800)}
function openDB(){if(dbPromise)return dbPromise;dbPromise=new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)});return dbPromise}
async function idbSet(key,val){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DB_STORE,"readwrite");tx.objectStore(DB_STORE).put(val,key);tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error);tx.onabort=()=>reject(tx.error)})}
async function idbGet(key){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DB_STORE,"readonly");const req=tx.objectStore(DB_STORE).get(key);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
function safeParse(t){try{return JSON.parse(t)}catch{return null}}
async function loadState(){const local=safeParse(localStorage.getItem(STORAGE_KEY)||"");let remote=null;try{remote=await idbGet(DB_RECORD_ID)}catch(e){} const best=[local,remote].filter(Boolean).sort((a,b)=>(b.savedAt||0)-(a.savedAt||0))[0]; if(!best?.data)return clone(defaultState); return {...clone(defaultState),...best.data,settings:{...clone(defaultState.settings),...(best.data.settings||{})},bodyweight:Array.isArray(best.data.bodyweight)?best.data.bodyweight:[],templates:Array.isArray(best.data.templates)&&best.data.templates.length?best.data.templates:clone(starterTemplates),activeWorkouts:Array.isArray(best.data.activeWorkouts)?best.data.activeWorkouts:[],finishedWorkouts:Array.isArray(best.data.finishedWorkouts)?best.data.finishedWorkouts:[],prs:best.data.prs||{}}}
async function saveState(){try{setSaveStatus("Saving...");const payload={savedAt:Date.now(),data:state};localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));await idbSet(DB_RECORD_ID,payload);markSaved()}catch(e){console.error(e);setSaveStatus("Save failed")}}
function estimate1RM(weight,reps){const w=Number(weight),r=Number(reps);if(!w||!r)return 0;return Math.round(w*(1+r/30))}
function computeExerciseVolume(ex){return ex.sets.reduce((s,x)=>s+((Number(x.weight)||0)*(Number(x.reps)||0)),0)}
function computeWorkoutVolume(w){return w.exercises.reduce((s,e)=>s+computeExerciseVolume(e),0)}
function countWorkoutSets(w){return w.exercises.reduce((s,e)=>s+e.sets.length,0)}
function formatDate(ts){if(!ts)return"";return new Date(ts).toLocaleDateString([], {day:"numeric",month:"short"})}
function formatDateTime(ts){if(!ts)return"";return new Date(ts).toLocaleString([], {day:"numeric",month:"short",hour:"numeric",minute:"2-digit"})}
function formatDuration(ms){const total=Math.max(0,Math.round(ms/1000)),m=Math.floor(total/60),s=total%60;return `${m}:${String(s).padStart(2,"0")}`}
function recalcStreak(){const days=[...new Set(state.finishedWorkouts.map(w=>new Date(w.completedAt).toDateString()))];days.sort((a,b)=>new Date(b)-new Date(a));let streak=0;let cursor=new Date();cursor.setHours(0,0,0,0);for(let i=0;i<365;i++){const key=cursor.toDateString();if(days.includes(key)){streak++;cursor.setDate(cursor.getDate()-1)}else{if(i===0){cursor.setDate(cursor.getDate()-1);if(days.includes(cursor.toDateString())){streak++;cursor.setDate(cursor.getDate()-1);continue}}break}}state.streak=streak}
function rebuildPRs(){const prs={};state.finishedWorkouts.forEach(w=>w.exercises.forEach(ex=>ex.sets.forEach(set=>{const weight=Number(set.weight)||0,reps=Number(set.reps)||0;if(!weight||!reps)return;const e1rm=estimate1RM(weight,reps),key=ex.name.trim();if(!prs[key]||e1rm>prs[key].e1rm)prs[key]={exercise:key,weight,reps,e1rm,date:w.completedAt||w.createdAt}})));state.prs=prs;recalcStreak()}
function getLastFinishedForExercise(name){const lower=name.trim().toLowerCase();for(const w of state.finishedWorkouts){for(const ex of w.exercises){if(ex.name.trim().toLowerCase()===lower)return clone(ex)}}return null}
function makeSet(index,weight="",reps="",done=false){return{id:uid(),setNumber:index+1,weight,reps,done}} function makeExercise(name){return{id:uid(),name,collapsed:true,notes:"",sets:[makeSet(0),makeSet(1),makeSet(2)]}} function makeWorkout(name,exerciseNames=[]){return{id:uid(),name:name||"New Workout",createdAt:Date.now(),completedAt:null,notes:"",exercises:exerciseNames.length?exerciseNames.map(makeExercise):[makeExercise("Exercise 1")]}}
function escapeHtml(str){return String(str??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;")}
function openSheet(title,html){$("#sheetTitle").textContent=title;$("#sheetBody").innerHTML=html;$("#sheetOverlay").classList.add("show")} function closeSheet(){$("#sheetOverlay").classList.remove("show");$("#sheetBody").innerHTML=""}
function newWorkoutSheet(){openSheet("Create Workout",`<div class="field-grid"><input id="newWorkoutName" type="text" placeholder="Workout name"><button id="createWorkoutBtn" class="btn primary">Create Workout</button></div>`);$("#createWorkoutBtn").onclick=()=>{const name=$("#newWorkoutName").value.trim();if(!name)return showToast("Enter a workout name");state.activeWorkouts.unshift(makeWorkout(name));saveState();closeSheet();state.activeTab="workouts";render();showToast("Workout created")}}
function bodyweightSheet(){openSheet("Log Bodyweight",`<div class="field-grid"><input id="bodyweightValue" type="number" step="0.1" placeholder="Bodyweight (${state.settings.units})"><button id="saveBodyweightBtn" class="btn primary">Save</button></div>`);$("#saveBodyweightBtn").onclick=()=>{const val=Number($("#bodyweightValue").value);if(!val)return showToast("Enter a valid bodyweight");state.bodyweight.unshift({id:uid(),value:val,createdAt:Date.now()});saveState();closeSheet();render();showToast("Bodyweight logged")}}

function getWeekStart(d){const date=new Date(d);const day=(date.getDay()+6)%7;date.setHours(0,0,0,0);date.setDate(date.getDate()-day);return date.getTime()}
function getTopSetLabel(workout){const all=[];workout.exercises.forEach(ex=>ex.sets.forEach(set=>{const w=Number(set.weight)||0,r=Number(set.reps)||0;if(w&&r)all.push({exercise:ex.name,w,r,e:estimate1RM(w,r)})}));if(!all.length)return"No top set";const best=all.sort((a,b)=>b.e-a.e)[0];return `${best.w}${state.settings.units} × ${best.r}`}
function renderHome(){const latestBW=state.bodyweight[0]?.value,thisWeek=getWeekStart(new Date()),workoutsThisWeek=state.finishedWorkouts.filter(w=>w.completedAt>=thisWeek).length,volumeThisWeek=state.finishedWorkouts.filter(w=>w.completedAt>=thisWeek).reduce((s,w)=>s+computeWorkoutVolume(w),0),lastPR=Object.values(state.prs).sort((a,b)=>b.date-a.date)[0],active=state.activeWorkouts[0];$("#screen-home").innerHTML=`<div class="hero-card"><div class="hero-title"><div><div class="pill">🔥 ${state.streak||0} day streak</div><h2 style="margin-top:12px">${active?"Ready to train?":"Stay consistent"}</h2><div class="hero-sub">${active?`Resume ${escapeHtml(active.name)} and keep building momentum.`:"Start your next session and stack another good day."}</div></div><button class="btn primary" id="heroActionBtn">${active?"Resume Workout":"New Workout"}</button></div></div><div class="grid-4" style="margin-bottom:14px"><div class="stat-card"><div class="label">Bodyweight</div><div class="value">${latestBW?`${latestBW} ${state.settings.units}`:"—"}</div><div class="subvalue">${latestBW?"Latest logged":"No entries yet"}</div></div><div class="stat-card"><div class="label">Weekly Volume</div><div class="value">${Math.round(volumeThisWeek)}</div><div class="subvalue">${state.settings.units} lifted this week</div></div><div class="stat-card"><div class="label">Sessions</div><div class="value">${workoutsThisWeek}</div><div class="subvalue">Completed this week</div></div><div class="stat-card"><div class="label">Latest PR</div><div class="value" style="font-size:1rem">${lastPR?escapeHtml(lastPR.exercise):"—"}</div><div class="subvalue">${lastPR?`${lastPR.weight}${state.settings.units} × ${lastPR.reps}`:"No PRs yet"}</div></div></div><div class="card"><div class="section-head"><h3>Quick actions</h3></div><div class="quick-actions"><button class="quick-btn" id="qaWorkout"><span class="bubble">＋</span><span>New workout</span></button><button class="quick-btn" id="qaBodyweight"><span class= function exerciseHtml(workout,ex){const prev=getLastFinishedForExercise(ex.name);const prevText=prev?(()=>{const best=[...prev.sets].filter(s=>(Number(s.weight)||0)&&(Number(s.reps)||0)).sort((a,b)=>estimate1RM(b.weight,b.reps)-estimate1RM(a.weight,a.reps))[0];return best?`${best.weight}${state.settings.units} × ${best.reps}`:"No previous data"})():"No previous data";const doneSets=ex.sets.filter(s=>s.done).length;return `<div class="exercise-card ${ex.collapsed?"collapsed":"expanded"}" data-exercise-id="${ex.id}"><div class="exercise-head" data-action="toggle-exercise"><div class="exercise-head-main"><button class="exercise-toggle" type="button">⌄</button><div><div class="exercise-title">${escapeHtml(ex.name)}</div><div class="exercise-sub">Previous: ${escapeHtml(prevText)} · Suggested: ${escapeHtml(getSuggestedWeight(ex.name))}${state.settings.showVolume?` · Volume: ${Math.round(computeExerciseVolume(ex))} ${state.settings.units}`:""}</div><div class="exercise-progress">${doneSets}/${ex.sets.length} sets complete</div></div></div><div class="mini-actions"><button class="mini-btn icon-only" data-action="exercise-timer">▶</button></div></div><div class="exercise-body"><div class="mini-actions" style="margin-top:2px"><button class="mini-btn" data-action="same-last">Last</button><button class="mini-btn" data-action="reps-last">Reps</button><button class="mini-btn" data-action="weight-last">Weight</button><button class="mini-btn" data-action="plus-2-5">+2.5</button><button class="mini-btn" data-action="plus-5">+5</button><button class="mini-btn" data-action="minus-2-5">-2.5</button><button class="mini-btn icon-only" data-action="notes">✎</button><button class="mini-btn icon-only" data-action="rename-exercise">✏</button><button class="mini-btn icon-only" data-action="delete-exercise">🗑</button></div><div class="set-list">${ex.sets.map(set=>`<div class="set-row ${set.done?"done":""}" data-set-id="${set.id}"><div class="set-index">Set ${set.setNumber}</div><input class="s function renderWorkouts(){$("#screen-workouts").innerHTML=`<div class="card"><div class="section-head"><h3>Active workouts</h3><div class="btn-row"><button class="btn small ghost" id="workoutTemplatesBtn">Templates</button><button class="btn small primary" id="newWorkoutBtn2">New</button></div></div>${state.activeWorkouts.length?state.activeWorkouts.map(workoutCardHtml).join(""):`<div class="empty">No active workouts. Start a session or load a template.</div>`}</div>`;$("#newWorkoutBtn2").onclick=newWorkoutSheet;$("#workoutTemplatesBtn").onclick=templatesSheet;bindWorkoutEvents()}
function getSuggestedWeight(name){const last=getLastFinishedForExercise(name);if(!last)return"No suggestion yet";const vals=last.sets.map(s=>Number(s.weight)||0).filter(Boolean);if(!vals.length)return"No suggestion yet";const s=Math.max(...vals)+2.5;return `${Number.isInteger(s)?s:s.toFixed(1).replace(/\.0$/,"")} ${state.settings.units}`}
function fillFromLast(exercise,mode){const last=getLastFinishedForExercise(exercise.name);if(!last)return showToast("No previous data");while(exercise.sets.length<last.sets.length)exercise.sets.push(makeSet(exercise.sets.length));exercise.sets.forEach((set,i)=>{const prev=last.sets[i];if(!prev)return;if(mode==="both"||mode==="weight")set.weight=prev.weight??"";if(mode==="both"||mode==="reps")set.reps=prev.reps??""});saveState();render();showToast("Copied previous values")}
function adjustWeights(exercise,delta){const last=getLastFinishedForExercise(exercise.name);exercise.sets.forEach((set,i)=>{let base=set.weight!==""?Number(set.weight):(last?.sets?.[i]?.weight!==""?Number(last.sets[i].weight):NaN);if(Number.isNaN(base))return;base=Math.max(0,base+delta);set.weight=Number.isInteger(base)?String(base):String(base.toFixed(1).replace(/\.0$/,""))});saveState();render()}
function finishWorkout(workout){workout.completedAt=Date.now();const summary={...clone(workout),durationMs:Date.now()-workout.createdAt};state.finishedWorkouts.unshift(summary);state.activeWorkouts=state.activeWorkouts.filter(w=>w.id!==workout.id);if(state.timer.sourceWorkoutId===workout.id)stopTimer();rebuildPRs();saveState();render();showToast("Workout finished");openSheet("Session Summary",`<div class="field-grid"><div class="card" style="margin:0"><div class="label">Duration</div><div class="value">${formatDuration(summary.durationMs)}</div><div class="subvalue">${summary.exercises.length} exercises · ${countWorkoutSets(summary)} sets</div></div><div class="card" style="margin:0"><div class="label">Volume</div><div class="value">${Math.round(computeWorkoutVolume(summary))} ${state.settings.units}</div><div class="subvalue">Top set: ${escapeHtml(getTopSetLabel(summary))}</div></div><textarea id="finishNotes" placeholder="Session notes...">${escapeHtml(summary.notes||"")}</textarea><button id="saveFinishNotes" class="btn primary">Done</button></div>`);$("#saveFinishNotes").onclick=()=>{const item=state.finishedWorkouts.find(x=>x.id===summary.id);if(item)item.notes=$("#finishNotes").value;saveState();closeSheet()}}
function bindWorkoutEvents(){$$(".workout-card").forEach(card=>{const wid=card.dataset.workoutId,workout=state.activeWorkouts.find(x=>x.id===wid);if(!workout)return;$('[data-action="rename-workout"]',card).onclick=()=>{const v=prompt("Rename workout",workout.name);if(!v||!v.trim())return;workout.name=v.trim();saveState();render()};$('[data-action="delete-workout"]',card).onclick=()=>{if(!confirm("Delete this workout?"))return;state.activeWorkouts=state.activeWorkouts.filter(x=>x.id!==wid);if(state.timer.sourceWorkoutId===wid)stopTimer();saveState();render();showToast("Workout deleted")};$('[data-action="finish-workout"]',card).onclick=()=>finishWorkout(workout);$('[data-action="add-exercise"]',card).onclick=()=>{const v=prompt("Exercise name");if(!v||!v.trim())return;workout.exercises.push(makeExercise(v.trim()));saveState();render();showToast("Exercise added")};$('[data-action="save-template"]',card).onclick=()=>{state.templates.unshift({id:uid(),name:workout.name,exercises:workout.exercises.map(e=>e.name)});saveState();showToast("Saved as template")};$('[data-action="start-timer"]',card).onclick=()=>startTimer(state.settings.defaultTimer,wid,null);$$(".exercise-card",card).forEach(exCard=>{const eid=exCard.dataset.exerciseId,exercise=workout.exercises.find(x=>x.id===eid);if(!exercise)return;$('[data-action="toggle-exercise"]',exCard).onclick=()=>{const opening=exercise.collapsed;workout.exercises.forEach(x=>x.collapsed=true);exercise.collapsed=!opening?true:false;if(opening){exercise.collapsed=false}saveState();render();if(opening){setTimeout(()=>{const el=document.querySelector(`[data-exercise-id="${eid}"]`);if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"})},30)}};$('[data-action="exercise-timer"]',exCard).onclick=e=>{e.stopPropagation();startTimer(state.settings.defaultTimer,wid,eid)};$('[data-action="same-last"]',exCard).onclick=()=>fillFromLast(exercise,"both");$('[data-action="reps-last"]',exCard).onclick=()=>fillFromLast(exercise,"reps");$('[data-action="weight-last"]',exCard).onclick=()=>fillFromLast(exercise,"weight");$('[data-action="plus-2-5"]',exCard).onclick=()=>adjustWeights(exercise,2.5);$('[data-action="plus-5"]',exCard).onclick=()=>adjustWeights(exercise,5);$('[data-action="minus-2-5"]',exCard).onclick=()=>adjustWeights(exercise,-2.5);$('[data-action="add-set"]',exCard).onclick=()=>{exercise.sets.push(makeSet(exercise.sets.length));saveState();render()};$('[data-action="notes"]',exCard).onclick=()=>{openSheet(exercise.name+" Notes",`<div class="field-grid"><textarea id="exerciseNotes">${escapeHtml(exercise.notes||"")}</textarea><button id="saveExerciseNotes" class="btn primary">Save Notes</button></div>`);$("#saveExerciseNotes").onclick=()=>{exercise.notes=$("#exerciseNotes").value;saveState();closeSheet();render();showToast("Notes saved")}};$('[data-action="rename-exercise"]',exCard).onclick=()=>{const v=prompt("Rename exercise",exercise.name);if(!v||!v.trim())return;exercise.name=v.trim();saveState();render()};$('[data-action="delete-exercise"]',exCard).onclick=()=>{if(!confirm("Delete this exercise?"))return;workout.exercises=workout.exercises.filter(x=>x.id!==eid);if(state.timer.sourceExerciseId===eid)stopTimer();saveState();render()};$$(".set-row",exCard).forEach(row=>{const sid=row.dataset.setId,set=exercise.sets.find(s=>s.id===sid);if(!set)return;$(".set-weight",row).oninput=e=>{set.weight=e.target.value;saveState();renderProgressOnly()};$(".set-reps",row).oninput=e=>{set.reps=e.target.value;saveState();renderProgressOnly()};$(".set-check",row).onchange=e=>{set.done=e.target.checked;if(set.done&&state.settings.autoStartTimer)startTimer(state.settings.defaultTimer,wid,eid);saveState();render()};$(".delete-set",row).onclick=()=>{exercise.sets=exercise.sets.filter(s=>s.id!==sid);exercise.sets.forEach((s,i)=>s.setNumber=i+1);saveState();render()}})})})}
function renderHistory(){$("#screen-history").innerHTML=`<div class="card"><div class="section-head"><h3>Workout history</h3></div>${state.finishedWorkouts.length?state.finishedWorkouts.map(w=>`<div class="history-card"><div class="section-head" style="margin-bottom:8px"><div><div class="workout-title">${escapeHtml(w.name)}</div><div class="workout-meta">${formatDateTime(w.completedAt)} · ${formatDuration((w.durationMs||(w.completedAt-w.createdAt)))} · ${Math.round(computeWorkoutVolume(w))} ${state.settings.units}</div></div><div class="badge">${getTopSetLabel(w)}</div></div><div class="chip-row">${w.exercises.map(ex=>`<span class="chip">${escapeHtml(ex.name)}</span>`).join("")}</div>${w.notes?`<div class="note" style="margin-top:10px">${escapeHtml(w.notes)}</div>`:""}</div>`).join(""):`<div class="empty">No history yet</div>`}</div>`}
function getWeeklyVolumeSeries(){const map=new Map();state.finishedWorkouts.forEach(w=>{const week=getWeekStart(new Date(w.completedAt));map.set(week,(map.get(week)||0)+computeWorkoutVolume(w))});const entries=[...map.entries()].sort((a,b)=>a[0]-b[0]).slice(-8);return{labels:entries.map(([k])=>formatDate(k)),values:entries.map(([,v])=>Math.round(v))}}
function buildLineChart(values,labels,suffix=""){const width=600,height=180,padX=24,padY=20,min=Math.min(...values),max=Math.max(...values),range=Math.max(1,max-min);const pts=values.map((v,i)=>{const x=padX+i*((width-padX*2)/(Math.max(1,values.length-1)));const y=height-padY-((v-min)/range)*(height-padY*2);return{x,y,v}});const d=pts.map((p,i)=>`${i?"L":"M"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");return `<svg class="chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none"><path class="line" d="${d}"></path>${pts.map(p=>`<circle class="point" cx="${p.x}" cy="${p.y}" r="3.5"></circle>`).join("")}<text x="${padX}" y="${height-4}" text-anchor="start">${escapeHtml(labels[0]||"")}</text><text x="${width-padX}" y="${height-4}" text-anchor="end">${escapeHtml(labels[labels.length-1]||"")}</text><text x="${padX}" y="12" text-anchor="start">${min}${suffix?' '+suffix:''}</text><text x="${width-padX}" y="12" text-anchor="end">${max}${suffix?' '+suffix:''}</text></svg>`}

function renderSettings(){$("#screen-settings").innerHTML=`<div class="card"><div class="section-head"><h3>Settings</h3><div class="version">v${state.version}</div></div><div class="settings-list"><div class="setting-item"><div><div style="font-weight:800">Default rest timer</div><div class="muted" style="font-size:.8rem;margin-top:4px">Used by workout and exercise timers</div></div><select id="settingTimer" style="max-width:120px"><option value="30">30s</option><option value="60">60s</option><option value="90">90s</option><option value="120">120s</option><option value="180">180s</option></select></div><div class="setting-item"><div><div style="font-weight:800">Auto-start timer on set complete</div><div class="muted" style="font-size:.8rem;margin-top:4px">Starts rest timer when you tick a set</div></div><label class="toggle"><input id="settingAutoTimer" type="checkbox"><span></span></label></div><div class="setting-item"><div><div style="font-weight:800">Show estimated 1RM</div><div class="muted" style="font-size:.8rem;margin-top:4px">Display estimated max values in PR views</div></div><label class="toggle"><input id="setting1RM" type="checkbox"><span></span></label></div><div class="setting-item"><div><div style="font-weight:800">Show volume</div><div class="muted" style="font-size:.8rem;margin-top:4px">Display total lifted volume in the app</div></div><label class="toggle"><input id="settingVolume" type="checkbox"><span></span></label></div><div class="setting-item"><div><div style="font-weight:800">Units</div><div class="muted" style="font-size:.8rem;margin-top:4px">Display label only</div></div><select id="settingUnits" style="max-width:120px"><option value="kg">kg</option><option value="lb">lb</option></select></div><div class="setting-item"><div><div style="font-weight:800">Backup & restore</div><div class="muted" style="font-size:.8rem;margin-top:4px">Export your data or restore from backup</div></div><div class="btn-row"><button id="backupBtn" class="btn sma
